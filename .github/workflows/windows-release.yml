name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-bridge:
    name: Bridge ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust_target: x86_64-unknown-linux-musl
          - arch: arm64
            rust_target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build bridge
        run: cargo zigbuild --manifest-path wsl-pty-bridge/Cargo.toml --release --target ${{ matrix.rust_target }}

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.arch }}
          path: wsl-pty-bridge/target/${{ matrix.rust_target }}/release/wsl-pty-bridge
          if-no-files-found: error

  package-windows:
    name: Package ${{ matrix.arch }}
    needs: build-bridge
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
          - arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download bridge artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-${{ matrix.arch }}
          path: prebuilt-bridge

      - name: Package release
        shell: bash
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            export GHOSTINTHEWSL_APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            export GHOSTINTHEWSL_APP_VERSION="dev-${GITHUB_SHA::7}"
          fi
          export GHOSTWSL_BRIDGE_BIN="$PWD/prebuilt-bridge/wsl-pty-bridge"
          bash scripts/package.sh release "${{ matrix.arch }}"

      - name: Set asset names
        shell: pwsh
        run: |
          if ("${{ matrix.arch }}" -eq "x64") {
            $stem = "ghostinthewsl"
          } else {
            $stem = "ghostinthewsl-${{ matrix.arch }}"
          }
          "ASSET_STEM=$stem" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure release assets exist
        shell: pwsh
        run: |
          $portablePath = Join-Path $env:GITHUB_WORKSPACE "dist/$env:ASSET_STEM.exe"
          $installerPath = Join-Path $env:GITHUB_WORKSPACE "dist/$env:ASSET_STEM-setup.exe"
          if (-not (Test-Path $portablePath)) {
            throw "Missing portable exe: $portablePath"
          }
          if (-not (Test-Path $installerPath)) {
            throw "Missing installer exe: $installerPath"
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostinthewsl-${{ matrix.arch }}
          path: |
            dist/${{ env.ASSET_STEM }}.exe
            dist/${{ env.ASSET_STEM }}-setup.exe
          if-no-files-found: error

  publish-release:
    name: Publish Release
    needs: package-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ghostinthewsl-*
          path: release-assets
          merge-multiple: true

      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.exe
